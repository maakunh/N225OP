<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>日経225ミニOP 価格/IVマルチチャート</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
<script src="data.js"></script>
<style>
  body{font-family:"Segoe UI","Hiragino Kaku Gothic ProN",sans-serif;margin:0;padding:16px;background:#0f1115;color:#e6e6e6;}
  h1{font-size:16px;font-weight:600;margin:0 0 4px;}
  nav{display:flex;gap:10px;margin-bottom:12px;font-size:13px;}
  nav a{color:#5aa0e6;text-decoration:none;padding:3px 8px;border:1px solid #2a2e38;border-radius:6px;}
  nav a.active{background:#1a2330;border-color:#3a82d6;}
  .row{display:flex;align-items:center;gap:14px;flex-wrap:wrap;margin-bottom:14px;}
  label{font-size:13px;color:#aab;}
  input[type=range]{width:220px;}
  .legend{display:flex;gap:16px;font-size:13px;}
  .c-call{color:#5aa0e6;} .c-put{color:#e68bb0;}
  .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:10px;}
  .cell{background:#1a1d24;border:1px solid #2a2e38;border-radius:8px;padding:6px 8px;}
  .cell.atm{border-color:#3a82d6;}
  .atmbadge{display:inline-block;margin-left:5px;padding:0 5px;font-size:9px;font-weight:700;
    line-height:14px;color:#cfe3f5;background:#22354b;border:1px solid #3a82d6;border-radius:4px;vertical-align:middle;}
  .cell h4{margin:0 0 2px;font-size:12px;font-weight:600;display:flex;justify-content:space-between;align-items:baseline;}
  .cell h4 .px{font-size:11px;color:#8a8f99;font-weight:400;}
  .cw{position:relative;height:96px;}
  #status{font-size:12px;color:#8a8f99;}
  .reloadbox{font-size:12px;color:#8a8f99;margin-left:auto;}
  button{padding:4px 12px;background:#1a1d24;color:#e6e6e6;border:1px solid #2a2e38;border-radius:6px;cursor:pointer;}
  .toggle{display:inline-flex;border:1px solid #2a2e38;border-radius:6px;overflow:hidden;}
  .toggle button{border:none;border-radius:0;padding:5px 16px;background:#1a1d24;color:#8a8f99;font-weight:600;}
  .toggle button.on{background:#22354b;color:#cfe3f5;}
  #stallBar{display:none;background:#5a1a1a;color:#ffd9d9;border:1px solid #d4537e;
    border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:13px;font-weight:600;}
</style>
</head>
<body>
<h1>日経225ミニオプション 価格/IV マルチチャート</h1>
<nav>
  <a href="dashboard.html">IVスマイル</a>
  <a href="price_dashboard.html" class="active">価格/IVマルチ</a>
  <a href="heatmap_dashboard.html">IVヒートマップ</a>
  <a href="futures_dashboard.html">先物/NT倍率</a>
</nav>

<div id="stallBar"></div>

<div class="row">
  <div class="toggle">
    <button id="modePrice" class="on">価格</button>
    <button id="modeIV">IV</button>
  </div>
  <label>表示本数（ATM中心）</label>
  <input type="range" id="rangeSlider" min="5" max="60" value="21" step="2">
  <span id="rangeLabel" style="font-size:14px;font-weight:600;">21</span>
  <div class="legend"><span class="c-call" id="legC">■ コール価格</span><span class="c-put" id="legP">■ プット価格</span></div>
  <span id="status"></span>
  <span class="reloadbox"><label><input type="checkbox" id="autoReload"> 自動更新</label></span>
</div>

<div class="grid" id="grid"></div>

<script>
const ATM_DEFAULT=70000;
let ATM=ATM_DEFAULT;
let byStrike={},times=[],charts=[],mode='price';
function resolveATM(){
  const u=window.OPTION_META&&window.OPTION_META.underlying;
  const all=Object.keys(byStrike).map(Number);
  if(u==null||!isFinite(u)||!all.length){ATM=ATM_DEFAULT;return;}
  ATM=all.reduce((best,k)=>Math.abs(k-u)<Math.abs(best-u)?k:best,all[0]);
}
function prep(){byStrike={};const seenT={};
  (window.OPTION_DATA||[]).forEach(r=>{const t=r[0],k=+r[1];
    if(!byStrike[k])byStrike[k]=[];
    byStrike[k].push({t:t,cP:+r[2],cIV:+r[3],pP:+r[4],pIV:+r[5]});seenT[t]=1;});
  times=Object.keys(seenT);}
function pickStrikes(n){const all=Object.keys(byStrike).map(Number).sort((a,b)=>a-b);
  let ci=0,best=1e9;all.forEach((k,i)=>{const d=Math.abs(k-ATM);if(d<best){best=d;ci=i;}});
  const half=Math.floor(n/2);const start=Math.max(0,ci-half);
  const end=Math.min(all.length,start+n);return all.slice(start,end).reverse();}

function valForMode(s){
  if(mode==='price') return [s.cP>0?s.cP:null, s.pP>0?s.pP:null];
  return [s.cIV>0?s.cIV:null, s.pIV>0?s.pIV:null];
}
function lastLabel(series){
  const rev=[...series].reverse();
  if(mode==='price'){
    const c=rev.find(s=>s.cP>0), p=rev.find(s=>s.pP>0);
    return 'C '+(c?c.cP:'—')+' / P '+(p?p.pP:'—');
  }else{
    const c=rev.find(s=>s.cIV>0), p=rev.find(s=>s.pIV>0);
    return 'C '+(c?c.cIV.toFixed(1):'—')+' / P '+(p?p.pIV.toFixed(1):'—');
  }
}

function render(){const n=+document.getElementById('rangeSlider').value;
  document.getElementById('rangeLabel').textContent=n;
  resolveATM();
  const strikes=pickStrikes(n);charts.forEach(c=>c.destroy());charts=[];
  const grid=document.getElementById('grid');grid.innerHTML='';
  strikes.forEach(k=>{const series=byStrike[k];
    const cell=document.createElement('div');cell.className='cell'+(k===ATM?' atm':'');
    const h=document.createElement('h4');
    const badge=(k===ATM)?'<span class="atmbadge">ATM</span>':'';
    h.innerHTML='<span>'+k.toLocaleString()+badge+'</span><span class="px">'+lastLabel(series)+'</span>';
    cell.appendChild(h);
    const wrap=document.createElement('div');wrap.className='cw';
    const cv=document.createElement('canvas');wrap.appendChild(cv);
    cell.appendChild(wrap);grid.appendChild(cell);
    const cData=series.map(s=>valForMode(s)[0]);
    const pData=series.map(s=>valForMode(s)[1]);
    const suffix=(mode==='iv')?'%':'';
    const ch=new Chart(cv,{type:'line',
      data:{labels:series.map(s=>s.t),datasets:[
        {data:cData,borderColor:'#3a82d6',borderWidth:1.3,pointRadius:0,tension:0.2,spanGaps:true},
        {data:pData,borderColor:'#d4537e',borderWidth:1.3,pointRadius:0,tension:0.2,spanGaps:true,borderDash:[4,2]}]},
      options:{responsive:true,maintainAspectRatio:false,animation:false,
        interaction:{mode:'index',intersect:false},
        plugins:{legend:{display:false},
          tooltip:{callbacks:{title:it=>it[0].label,
            label:c=>(c.datasetIndex===0?'C':'P')+': '+(c.parsed.y!=null?c.parsed.y+suffix:'—')}}},
        scales:{x:{display:false},
          y:{ticks:{color:'#8a8f99',font:{size:9},maxTicksLimit:4},grid:{color:'rgba(128,128,128,0.1)'}}}}});
    charts.push(ch);});
  const u=window.OPTION_META&&window.OPTION_META.underlying;
  const atmInfo='ATM '+ATM.toLocaleString()+(isFinite(u)&&u!=null?'（ミニ '+(+u).toLocaleString()+'）':'');
  document.getElementById('status').textContent=
    strikes.length+'銘柄 / '+times.length+'時点 / '+(mode==='price'?'価格':'IV')+'表示 / '+atmInfo;}

function setMode(m){
  mode=m;
  document.getElementById('modePrice').classList.toggle('on',m==='price');
  document.getElementById('modeIV').classList.toggle('on',m==='iv');
  document.getElementById('legC').textContent=(m==='price')?'■ コール価格':'■ コールIV';
  document.getElementById('legP').textContent=(m==='price')?'■ プット価格':'■ プットIV';
  render();
}

function checkStall(){
  const STALL_SEC=420;  // この秒数だけG1が更新されなければアラート（自動リロード5分より長め）
  const meta=window.OPTION_META;
  let stalled=false, ageSec=null;
  if(meta&&meta.lastAlive){
    const last=new Date(meta.lastAlive.replace(' ','T'));
    ageSec=(Date.now()-last.getTime())/1000;
    stalled=ageSec>STALL_SEC;
  }else{
    stalled=true;  // メタ情報自体が無い＝data.jsが古いか異常
  }
  const bar=document.getElementById('stallBar');
  if(stalled){
    bar.style.display='block';
    bar.textContent='⚠ データ更新が停止しています'
      +(ageSec!=null?'（最終更新から約'+Math.floor(ageSec/60)+'分経過）':'')
      +' — MarketSpeed II の接続を確認してください';
  }else{
    bar.style.display='none';
  }
}

function init(){
  checkStall();setInterval(checkStall,30000);  // ストール監視（データ有無に関わらず先に起動）
  if(!window.OPTION_DATA){
    document.getElementById('status').textContent='data.js が読み込めません';return;}
  prep();
  document.getElementById('rangeSlider').addEventListener('input',render);
  document.getElementById('modePrice').addEventListener('click',()=>setMode('price'));
  document.getElementById('modeIV').addEventListener('click',()=>setMode('iv'));
  setupAutoReload();render();}
function setupAutoReload(){const cb=document.getElementById('autoReload');
  if(localStorage.getItem('autoReload')==='1'){cb.checked=true;
    setTimeout(()=>location.reload(),300000);}
  cb.addEventListener('change',()=>localStorage.setItem('autoReload',cb.checked?'1':'0'));}
window.addEventListener('DOMContentLoaded',init);
</script>
</body>
</html>
